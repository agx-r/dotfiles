unbind -a -T prefix
unbind -a -T root
unbind -a -T copy-mode
unbind -a -T copy-mode-vi

set -g default-shell    /usr/bin/nu
set -g history-limit    50000
set -g default-terminal "screen-256color"
set -g escape-time      0 
set -g display-time     4000

setw -g mode-keys   vi
set -g  status-keys vi
set -g  prefix      C-Space

bind-key O     command-prompt
bind-key p     run-shell "wl-paste -n | tmux load-buffer - ; tmux paste-buffer -pr"
bind-key H     previous-window
bind-key I     next-window
bind-key c     new-window
bind-key C     new-window -c '#{pane_current_path}'
bind-key h     select-pane -L
bind-key n     select-pane -D
bind-key e     select-pane -U
bind-key i     select-pane -R
bind-key q     confirm-before -p "destroy #P:y/n" kill-pane
bind-key Left  resize-pane -L 10
bind-key Down  resize-pane -D 10
bind-key Up    resize-pane -U 10
bind-key Right resize-pane -R 10
bind-key Space copy-mode
bind-key V     split-window -c '#{pane_current_path}'
bind-key v     split-window -h -c '#{pane_current_path}'
bind-key r     rotate-window

bind-key -T copy-mode-vi v      send -X begin-selection
bind-key -T copy-mode-vi V      send -X rectangle-on \; send-keys -X begin-selection
bind-key -T copy-mode-vi x      send -X select-line
bind-key -T copy-mode-vi w      send -X select-word
bind-key -T copy-mode-vi j      send -X copy-pipe-and-cancel -CP "wl-copy"
bind-key -T copy-mode-vi h      send -X cursor-left
bind-key -T copy-mode-vi n      send -X cursor-down
bind-key -T copy-mode-vi e      send -X cursor-up
bind-key -T copy-mode-vi i      send -X cursor-right
bind-key -T copy-mode-vi k      send -X search-again
bind-key -T copy-mode-vi K      send -X search-reverse
bind-key -T copy-mode-vi H      send -X start-of-line
bind-key -T copy-mode-vi I      send -X end-of-line
bind-key -T copy-mode-vi f      send -X next-word-end
bind-key -T copy-mode-vi b      send -X previous-word
bind-key -T copy-mode-vi F      send -X next-space-end
bind-key -T copy-mode-vi c-n    send -X bottom-line
bind-key -T copy-mode-vi c-m    send -X middle-line
bind-key -T copy-mode-vi c-e    send -X top-line
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi C-c    send -X cancel
bind-key -T copy-mode-vi q      send -X cancel

set -g visual-activity on
set -g visual-bell     on
set -g visual-silence  off
set -g bell-action     none

set -g status-right-length 10
set -g status-position     bottom
set -g status-justify      left

set -g pane-border-style        'fg=white'
set -g pane-active-border-style 'fg=green'

set -g status-style       'fg=blue'
set -g status-right       '#{?client_prefix,#[fg=green],#[fg=green]} '
set -g status-right-style 'fg=black bg=yellow'
set -g status-right       '#[bg=yellow fg=black] %Y-%m-%d %H:%M #[bg=yellow fg=black]'
set -g status-right       ''

set -g message-style 'fg=yellow'

setw -g monitor-activity  off
setw -g clock-mode-colour yellow

setw -g mode-style                   'fg=black bg=white'
setw -g window-status-current-style  'fg=green'
setw -g window-status-current-format '#[fg=green]< #I #W #F >#[bg=white]'
setw -g window-status-style          'fg=cyan'
setw -g window-status-format         ' #I #[fg=white]#W #[fg=yellow]#F '
setw -g window-status-bell-style     'fg=yellow'
