<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="font">
    <test name="family" qual="any">
      <string>Terminus (TTF)</string>
    </test>
  </match>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Terminus (TTF)</family>
    </prefer>
  </alias>
</fontconfig>
